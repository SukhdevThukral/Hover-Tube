<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="wdith=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="hover.css">
        <style>
            body{
                width: 280px;
                margin: 0;
                padding: 24px;
                background: #0a0a0a;
                color: #f5f5f7;
                font-family: 'Geist', 'Inter', -apple-system, sans-serif;
            }

            .header{
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
            }

            .logo-group{
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo-box{
                width: 32px;
                height: 32px;
                background: linear-gradient(135deg, #4dbaff, #00ff88);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 900;
                color: #000;
                font-size: 16px;
            }

            .status-pill {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 10px;
                font-weight: 800;
                background: rgba(0, 255, 136, 0.05);
                color: #00ff88;
                padding: 5px 12px;
                border-radius: 20px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                border: 1px solid rgba(0, 255, 136, 0.1);
            }

            .dot {
                width: 6px;
                height: 6px;
                background-color: #00ff88;
                border-radius: 50%;
                box-shadow: 0 0 8px #00ff88;
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0% { transform: scale(1); opacity: 1; box-shadow: 0 0 8px #00ff88;}
                50% {transform: scale(1.2); opacity: 0.7; box-shadow: 0 0 15px #00ff88;}
                100% { transform: scale(1); opacity: 1; box-shadow: 0 0 8px #00ff88;}
            }

            .key-section {
                margin: 20px 0;
                padding: 12px;
                background: rgba(255,255,255,0.03);
                border-radius: 12px;
                border: 1px solid rgba(255,255,255,0.05);
            }

            input{
                width: 100%;
                background: #111;
                border: 1px solid #222;
                border-radius: 6px;
                padding: 8px;
                color: #fff;
                font-size: 11px;
                font-family: monospace;
                outline: none;
                box-sizing: border-box;
                margin-bottom: 8px;
            }

            input:focus {border-color: #4dbaff;}

            #save-key {
                width: 100%;
                background: #f5f5f7;
                border: none;
                border-radius: 6px;
                padding: 8px;
                color: #000;
                font-weight: 700;
                cursor: pointer;
                font-size: 11px;
                transition: opacity 0.2s;
            }

            #save-key:active {opacity: 0.8;}

            .desc {
                font-size: 13px;
                color: #888;
                line-height: 1.5;
                margin: 0;
            }

            .footer{
                margin-top: 24px;
                padding-top: 16px;
                border-top: 1px solid rgba(255,255,255,0.05);
                font-size: 10px;
                color: #444;
                display: flex;
                justify-content: space-between;
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div class="logo-group">
                <div class="logo-box">H</div>
                <div class="font-weight: 700; font-size: 16px; letter-spacing: -0.02em;">Hover Tube</div>
            </div>
        </div>

        <div class="margin-bottom:16px;">
            <div class="status-pill">
                <span class="dot"></span>
                System Online
            </div>
        </div>
        <p class="desc">
            Hover over any YouTube link to analyze the content and get a fixed AI conclusion instantly :3.
        </p>

        <div class="key-section">
            <div style="font-size: 9px; color: #555; margin-bottom: 6px; text-transform: uppercase; font-weight: 800;">Gemini API Key</div>
            <input type="password" id="api-key-input" placeholder="Paste your API key here...">
            <button id="save-key">SAVE CONFIG</button>
            <div id="save-status" style="font-size: 9px; margin-top: 6px; color: #00ff88; opacity: 0; text-align: center;">Configuration Updated!</div>
        </div>

        <div class="footer">
            <span>V0.1-STABLE</span>
            <span>sukhdevthukral.xyz</span>
        </div>

        <script src="popup-logic.js"></script>
    </body>
</html>
