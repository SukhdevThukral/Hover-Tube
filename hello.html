<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="hover.css">
        <style>
            :root{
                --accent: #00ff88;
                --accent-glow:rgba(0, 255, 136, 0.3);
                --bg: #0a0a0a;
                --card-bg: rgba(255, 255, 255, 0.04);
                --border: rgba(255, 255, 255, 0.1);
                --text-main: #f5f5f7;
                --text-dim: #888;
            }

            body{
                width: 300px;
                margin: 0;
                padding: 20px;
                background:var(--bg);
                color: var(--text-main);
                font-family: 'Geist', 'Inter', -apple-system, system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
            }

            .header{
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
            }

            .logo-group{
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .logo-box{
                width: 34px;
                height: 34px;
                background: linear-gradient(135deg, #4dbaff, var(--accent));
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 900;
                color: #000;
                font-size: 18px;
                box-shadow: 0 4px 12px rbga(77, 186, 255, 0.2);
            }

            .logo-text{
                font-weight: 700; 
                font-size: 17px; 
                letter-spacing: -0.03em;
                color: #ffffff;
                background: linear-gradient(to bottom, #ffffff, #cccccc);
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .status-pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-size: 9px;
                font-weight: 800;
                background: rgba(0, 255, 136, 0.08);
                color: var(--accent);
                padding: 4px 10px;
                border-radius: 100px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border: 1px solid rgba(0, 255, 136, 0.2);
                margin-bottom: 16px;
            }

            .dot {
                width: 6px;
                height: 6px;
                background-color: var(--accent);
                border-radius: 50%;
                box-shadow: 0 0 8px var(--accent);
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0% { transform: scale(1); opacity: 1; }
                50% {transform: scale(1.3); opacity: 0.5;}
                100% { transform: scale(1); opacity: 1;}
            }

            .key-section {
                padding: 16px;
                background: var(--card-bg);
                border-radius: 14px;
                border: 1px solid var(--border);
            }

            .label{
                font-size: 10px;
                color: #666;
                margin-bottom: 8px;
                text-transform: uppercase;
                font-weight: 800;
                letter-spacing: 0.05em;
            }

            input{
                width: 100%;
                background: rgba(0, 0, 0, 0.3);
                border: 1px solid #222;
                border-radius: 8px;
                padding: 10px;
                color: #fff;
                font-size: 12px;
                font-family: 'JetBrains Mono', monospace;
                outline: none;
                box-sizing: border-box;
                margin-bottom: 8px;
                transition: all 0.2s;
            }

            input:focus {
                border-color: #4dbaff;
                background: rgba(0, 0, 0, 0.5);
            }

            #save-key {
                width: 100%;
                background: #fff;
                border: none;
                border-radius: 8px;
                padding: 10px;
                color: #000;
                font-weight: 700;
                cursor: pointer;
                font-size: 12px;
                transition: transform 0.1s opacity 0.2s;
            }

            #save-key:hover { opacity: 0.9;}
            #save-key:active {transform: scale(0.98);}


            #change-key {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: #eee;
                font-size: 10px;
                font-weight: 600;
                padding: 6px 14px;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.2s;
            }

            #change-key:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.3);
                color: #fff;
            }

            .desc {
                font-size: 13px;
                color:var(--text-dim);
                line-height: 1.6;
                margin: 0 0 20px 0;
            }

            .footer{
                margin-top: 24px;
                padding-top: 16px;
                border-top: 1px solid rgba(255,255,255,0.05);
                font-size: 10px;
                color: #444;
                display: flex;
                justify-content: space-between;
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div class="logo-group">
                <div class="logo-box">H</div>
                <div class="logo-text">Hover Tube</div>
            </div>
        </div>

        <div class="status-pill">
            <span class="dot"></span>
            System Online
        </div>

        <p class="desc">
            Hover over any YouTube link to analyze the content and get a fixed AI conclusion instantly :3.
        </p>

        <div class="key-section">

            <div class="label">Gemini API Key</div>

            <div id="key-input-container">
                <input type="password" id="api-key-input" placeholder="Paste your API key here...">
                <button id="save-key">SAVE CONFIGURATION</button>
            </div>
            
            <div id="key-active-container" style="display: none; text-align: center; padding: 5px 0;">
                <div style="color: #00ff88; font-size: 11px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.02em;">
                    KEY ACTIVE • READY TO SCAN
                </div>
                <button id="change-key">
                    REPLACE KEY
                </button>
            </div>
            
            <div id="save-status" style="font-size: 10px; margin-top: 8px; color: var(--accent); opacity: 0; text-align: center; font-weight: 600;">Configuration Saved!!</div>
        </div>

        <div class="footer">
            <span>V0.1-STABLE</span>
            <span>sukhdevthukral.xyz</span>
        </div>

        <script src="popup-logic.js"></script>
    </body>
</html>
